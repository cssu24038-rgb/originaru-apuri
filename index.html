<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>課題提出管理アプリ (Web UI版)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 30px; background-color: #f8f9fa; color: #333; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; margin: 0 auto; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eeeeee; }
        th { background-color: #34495e; color: white; font-weight: bold; }
        /* 状態ごとの色分け */
        .status-0 { background-color: #fce8e6; color: #a51d24; font-weight: bold; } /* 未提出 (赤系) */
        .status-1 { background-color: #e6f4ea; color: #137333; font-weight: bold; } /* 提出済 (緑系) */
        .status-2 { background-color: #f1f3f4; color: #5f6368; }                   /* 課題なし (グレー系) */
        button { padding: 8px 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 14px; transition: background 0.2s; }
        button:hover { background-color: #2980b9; }
        /* エラー表示スタイル */
        .error-message { max-width: 600px; margin: 15px auto; padding: 12px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <h1>課題提出管理アプリ (Web UI版)</h1>
    
    <div id="error-container" class="error-message"></div>

    <table>
        <thead>
            <tr>
                <th>週</th>
                <th>提出状態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="task-table-body">
            </tbody>
    </table>

    <script src="task_manager.js"></script>
    <script>
        // 状態数値と画面表示のマッピング
        const statusMap = {
            0: { text: "未提出", class: "status-0" },
            1: { text: "提出済", class: "status-1" },
            2: { text: "課題なし", class: "status-2" }
        };

        // Emscripten(C言語)の読み込みが完了したら自動実行される
        Module['onRuntimeInitialized'] = function() {
            // C言語の関数を使えるようにJavaScript側に関数登録(ラップ)
            const getTaskStatus = Module.cwrap('get_task_status', 'number', ['number']);
            const toggleTask = Module.cwrap('toggle_task', 'number', ['number']);

            const tbody = document.getElementById('task-table-body');

            // 1週目から13週目までの行をループで作る
            for (let i = 1; i <= 13; i++) {
                const tr = document.createElement('tr');

                // 1. 週番号セル
                const tdWeek = document.createElement('td');
                tdWeek.textContent = `${i}回目`;
                tr.appendChild(tdWeek);

                // 2. 状態表示セル
                const tdStatus = document.createElement('td');
                tdStatus.id = `status-${i}`;
                const initialStatus = getTaskStatus(i);
                
                // C言語側の入力検証エラーチェック
                if (initialStatus === -1) {
                    showError("エラー: 初期データの取得に失敗しました。");
                    return;
                }
                updateStatusCell(tdStatus, initialStatus);
                tr.appendChild(tdStatus);

                // 3. 操作ボタンセル
                const tdAction = document.createElement('td');
                const btn = document.createElement('button');
                btn.textContent = "状態を変更";
                btn.onclick = function() {
                    clearError();
                    // C言語の関数を呼び出して状態をトグル
                    const newStatus = toggleTask(i);
                    
                    // C言語側の入力検証エラーチェック
                    if (newStatus === -1) {
                        showError(`エラー: ${i}回目の状態変更に失敗しました(範囲外エラー)。`);
                    } else {
                        updateStatusCell(tdStatus, newStatus);
                    }
                };
                tdAction.appendChild(btn);
                tr.appendChild(tdAction);

                tbody.appendChild(tr);
            }
        };

        // セルの見た目を更新する補助関数
        function updateStatusCell(cell, status) {
            cell.textContent = statusMap[status].text;
            cell.className = statusMap[status].class;
        }

        // エラーを表示する関数
        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            errorContainer.textContent = message;
            errorContainer.style.display = 'block';
        }

        // エラーを消す関数
        function clearError() {
            document.getElementById('error-container').style.display = 'none';
        }
    </script>
</body>
</html>
