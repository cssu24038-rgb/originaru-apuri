<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>講義提出・出席総合管理アプリ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        
        /* 教室・日付入力エリアのスタイル */
        .info-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: table; width: 100%; box-sizing: border-box; }
        .info-block { display: table-cell; width: 50%; vertical-align: middle; }
        .info-block.right { text-align: right; }
        .classroom-display { font-size: 16px; font-weight: bold; color: #2c3e50; }
        .classroom-badge { background-color: #e8f0fe; color: #1a73e8; padding: 4px 12px; border-radius: 12px; margin-left: 5px; }
        
        input[type="text"], input[type="date"] { padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="text"] { width: 180px; }
        input[type="date"] { width: 160px; }
        label { font-weight: bold; margin-right: 8px; color: #4a5568; }
        
        /* テーブルスタイル */
        table { border-collapse: collapse; width: 100%; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #eeeeee; }
        th { background-color: #34495e; color: white; font-weight: bold; font-size: 14px; }
        
        /* 状態ごとのスタイル */
        .status-task-0 { background-color: #fce8e6; color: #a51d24; font-weight: bold; }
        .status-task-1 { background-color: #e6f4ea; color: #137333; font-weight: bold; }
        .status-task-2 { background-color: #f1f3f4; color: #5f6368; }
        
        .status-attend-0 { background-color: #ffffff; color: #5f6368; }
        .status-attend-1 { background-color: #eaf5ea; color: #1e7e34; font-weight: bold; }
        .status-attend-2 { background-color: #fdf3e7; color: #d97706; font-weight: bold; }
        .status-attend-3 { background-color: #fce8e6; color: #c53030; font-weight: bold; }

        button { padding: 6px 12px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 13px; transition: background 0.2s; }
        button:hover { background-color: #2980b9; }
        button.btn-success { background-color: #2ecc71; }
        button.btn-success:hover { background-color: #27ae60; }
        
        /* エラー表示 */
        .error-message { padding: 12px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px; display: none; text-align: center; font-weight: bold; margin-bottom: 20px; }
        .divider { border-top: 1px solid #e2e8f0; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>講義提出・出席総合管理アプリ</h1>
        
        <div id="error-container" class="error-message"></div>

        <div class="info-panel">
            <div style="display: table-row;">
                <div class="info-block">
                    <label for="base-date-input">第1回授業日:</label>
                    <input type="date" id="base-date-input">
                </div>
                <div class="info-block right">
                    <input type="text" id="room-input" placeholder="例: 3号館302教室">
                    <button id="room-submit-btn" class="btn-success">教室を変更</button>
                </div>
            </div>
            <div class="divider"></div>
            <div style="display: table-row;">
                <div class="info-block" style="display: table-cell; width: 100%;">
                    <span class="classroom-display">現在の教室: <span id="room-text" class="classroom-badge">未設定</span></span>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>回数</th>
                    <th>日付 (カレンダー)</th>
                    <th>課題提出状態</th>
                    <th>課題操作</th>
                    <th>出席状況</th>
                    <th>出席操作</th>
                </tr>
            </thead>
            <tbody id="main-table-body">
                </tbody>
        </table>
    </div>

    <script src="task_manager.js"></script>
    <script>
        const taskMap = {
            0: { text: "未提出", class: "status-task-0" },
            1: { text: "提出済", class: "status-task-1" },
            2: { text: "課題なし", class: "status-task-2" }
        };

        const attendMap = {
            0: { text: "未定", class: "status-attend-0" },
            1: { text: "出席", class: "status-attend-1" },
            2: { text: "欠席", class: "status-attend-3" },
            3: { text: "遅刻", class: "status-attend-2" }
        };

        // ラップ用グローバル関数ポインタ
        let getTaskStatus, toggleTask, getAttendanceStatus, toggleAttendance;
        let getClassroom, updateClassroom, setBaseDate, getBaseYear, getBaseMonth, getBaseDay;

        Module['onRuntimeInitialized'] = function() {
            // C言語関数のラップ
            getTaskStatus = Module.cwrap('get_task_status', 'number', ['number']);
            toggleTask = Module.cwrap('toggle_task', 'number', ['number']);
            getAttendanceStatus = Module.cwrap('get_attendance_status', 'number', ['number']);
            toggleAttendance = Module.cwrap('toggle_attendance', 'number', ['number']);
            getClassroom = Module.cwrap('get_classroom', 'string', []);
            updateClassroom = Module.cwrap('update_classroom', 'number', ['string']);
            setBaseDate = Module.cwrap('set_base_date', 'number', ['number', 'number', 'number']);
            getBaseYear = Module.cwrap('get_base_year', 'number', []);
            getBaseMonth = Module.cwrap('get_base_month', 'number', []);
            getBaseDay = Module.cwrap('get_base_day', 'number', []);

            // 初期表示設定
            document.getElementById('room-text').textContent = getClassroom();
            
            // 初期の基準日（未設定の場合は本日の日付を初期候補としてカレンダーに入れる）
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('base-date-input').value = `${yyyy}-${mm}-${dd}`;
            
            // C言語側に初期日付を設定
            setBaseDate(yyyy, today.getMonth() + 1, today.getDate());

            // 教室変更イベント
            document.getElementById('room-submit-btn').onclick = function() {
                clearError();
                const inputValue = document.getElementById('room-input').value.trim();
                const result = updateClassroom(inputValue);
                if (result === -2) {
                    showError("【エラー】教室の場所は1文字以上、31文字以内で入力してください。");
                } else {
                    document.getElementById('room-text').textContent = getClassroom();
                    document.getElementById('room-input').value = "";
                }
            };

            // ★カレンダー変更イベント（第1回が選ばれたらC言語に送り、テーブルを再描画）
            document.getElementById('base-date-input').onchange = function() {
                clearError();
                const dateVal = this.value; // "YYYY-MM-DD"
                if (!dateVal) return;

                const parts = dateVal.split('-');
                const year = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10);
                const day = parseInt(parts[2], 10);

                // C言語側のバリデーションを通す
                const result = setBaseDate(year, month, day);
                if (result === -3) {
                    showError("【エラー】無効な日付が選択されました。");
                } else {
                    renderTable(); // 2回目以降を自動計算して再描画
                }
            };

            // 初回テーブル描画
            renderTable();
        };

        // ★第1回を基準に2回目以降の日付を自動計算してテーブルを構築する関数
        function renderTable() {
            const tbody = document.getElementById('main-table-body');
            tbody.innerHTML = ""; // 既存のテーブルをクリア

            // C言語から現在の第1回授業日を取得
            const by = getBaseYear();
            const bm = getBaseMonth();
            const bd = getBaseDay();

            // 13週分ループ生成
            for (let i = 1; i <= 13; i++) {
                const tr = document.createElement('tr');

                // 1. 回数
                const tdWeek = document.createElement('td');
                tdWeek.textContent = `第 ${i} 回`;
                tr.appendChild(tdWeek);

                // 2. カレンダー機能 (第1回を基準に(i-1)週間後を自動計算)
                const tdCal = document.createElement('td');
                if (by === 0) {
                    tdCal.textContent = "未設定";
                } else {
                    let dateObj = new Date(by, bm - 1, bd);
                    dateObj.setDate(dateObj.getDate() + ((i - 1) * 7)); // 1週間(7日)ずつ加算
                    tdCal.textContent = `${dateObj.getFullYear()}/${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                }
                tdCal.style.color = "#555";
                tr.appendChild(tdCal);

                // 3. 課題提出状態
                const tdTaskStatus = document.createElement('td');
                updateCell(tdTaskStatus, getTaskStatus(i), taskMap);
                tr.appendChild(tdTaskStatus);

                // 4. 課題操作ボタン
                const tdTaskAction = document.createElement('td');
                const btnTask = document.createElement('button');
                btnTask.textContent = "変更";
                btnTask.onclick = function() {
                    clearError();
                    const nextStatus = toggleTask(i);
                    if (nextStatus === -1) showError("エラー: 範囲外の週が指定されました。");
                    else updateCell(tdTaskStatus, nextStatus, taskMap);
                };
                tdTaskAction.appendChild(btnTask);
                tr.appendChild(tdTaskAction);

                // 5. 出席状況
                const tdAttendStatus = document.createElement('td');
                updateCell(tdAttendStatus, getAttendanceStatus(i), attendMap);
                tr.appendChild(tdAttendStatus);

                // 6. 出席操作ボタン
                const tdAttendAction = document.createElement('td');
                const btnAttend = document.createElement('button');
                btnAttend.textContent = "出席切替";
                btnAttend.onclick = function() {
                    clearError();
                    const nextAttend = toggleAttendance(i);
                    if (nextAttend === -1) showError("エラー: 範囲外の週が指定されました。");
                    else updateCell(tdAttendStatus, nextAttend, attendMap);
                };
                tdAttendAction.appendChild(btnAttend);
                tr.appendChild(tdAttendAction);

                tbody.appendChild(tr);
            }
        }

        function updateCell(cell, statusValue, map) {
            cell.textContent = map[statusValue].text;
            cell.className = map[statusValue].class;
        }

        function showError(msg) {
            const err = document.getElementById('error-container');
            err.textContent = msg;
            err.style.display = 'block';
        }

        function clearError() {
            document.getElementById('error-container').style.display = 'none';
        }
    </script>
</body>
</html>
