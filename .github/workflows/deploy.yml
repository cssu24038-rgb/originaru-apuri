name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Compile C to WebAssembly (Web UI Mode)
        # カレンダー基準日用の関数をエクスポートに追加してビルドします
        run: |
          emcc main.c -o task_manager.js -s EXPORTED_FUNCTIONS="['_toggle_task', '_get_task_status', '_get_attendance_status', '_toggle_attendance', '_get_classroom', '_update_classroom', '_set_base_date', '_get_base_year', '_get_base_month', '_get_base_day']" -s EXPORTED_RUNTIME_METHODS="['ccall','cwrap']" -s NO_EXIT_RUNTIME=1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4